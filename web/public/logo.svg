<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EnvRouter">
  <style>
    .tile { fill: #ffffff; stroke: #cbd5e1; }
    .source { fill: #2f3e56; }
    .source-line { stroke: #2f3e56; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #1c1c1f; stroke: #3f3f46; }
      .source { fill: #cbd5e1; }
      .source-line { stroke: #cbd5e1; }
    }
  </style>
  <!-- tile + border for contrast on light and dark backgrounds -->
  <rect class="tile" x="1.5" y="1.5" width="61" height="61" rx="14" stroke-width="3"/>
  <!-- one service... -->
  <circle class="source" cx="15" cy="32" r="5.5"/>
  <path class="source-line" d="M20.5 32 H27" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- ...routed to three environments -->
  <path d="M27 32 C36 32 35 15 43 15" stroke="#d95757" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M27 32 H43" stroke="#e8933a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M27 32 C36 32 35 49 43 49" stroke="#2ba98a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <circle cx="47.5" cy="15" r="5.5" fill="#d95757"/>
  <circle cx="47.5" cy="32" r="5.5" fill="#e8933a"/>
  <circle cx="47.5" cy="49" r="5.5" fill="#2ba98a"/>
</svg>
